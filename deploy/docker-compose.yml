services:
  app:
    build:
      context: ..
      dockerfile: deploy/Containerfile
    ports:
      - "8000:8000"
    environment:
      - INDGEN_DEBUG=true
      - INDGEN_CORS_ORIGINS=["*"]
      - INDGEN_STATIC_DIR=/app/static

  app-dev-backend:
    image: python:3.12-slim
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: >
      sh -c "pip install -e '.[dev]' && uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    environment:
      - INDGEN_DEBUG=true
      - INDGEN_CORS_ORIGINS=["http://localhost:5173"]
    profiles:
      - dev

  app-dev-frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app-dev-backend
    profiles:
      - dev

  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=indgen
      - POSTGRES_USER=indgen
      - POSTGRES_PASSWORD=indgen
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - db

volumes:
  pgdata:
  frontend_node_modules:
